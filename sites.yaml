crawl:
  per_page: 100           # 1リクエスト当たりの取得件数 (WP最大100)
  request_timeout: 30     # HTTPタイムアウト(秒)
  delay_between_requests: 0.5  # サイト負荷軽減のための間隔(秒)
  schedule_hours: 6       # 何時間ごとに自動クロールするか
